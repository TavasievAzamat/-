<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Создать задачу | Ежедневник</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* основная карточка формы */
        .create-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.2s;
        }

        /* шапка с навигацией */
        .form-header {
            background: white;
            padding: 1.5rem 2rem 0.8rem 2rem;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-area h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1e4970, #2c628b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .title-area h2 i {
            color: #2e6a96;
            background: none;
        }

        .nav-back {
            background: #eef3fc;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            color: #2c5e86;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-back:hover {
            background: #e2ecf5;
            color: #1a486b;
            transform: translateX(-3px);
        }

        /* основной контент формы */
        .form-container {
            padding: 2rem 2rem 2rem 2rem;
        }

        .input-field {
            margin-bottom: 1.8rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: #1d4d6e;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
        }

        label i {
            font-size: 1rem;
            color: #3e7ea7;
        }

        .required-star {
            color: #e26d5c;
            font-size: 1rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.9rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: 1.5px solid #e2eaf1;
            border-radius: 1.2rem;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            color: #1f3e54;
            font-weight: 500;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #5f9bc2;
            box-shadow: 0 0 0 3px rgba(47, 108, 158, 0.15);
        }

        .priority-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }

        .priority-option {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .priority-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .priority-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: #f5f9fe;
            border: 1.5px solid #e2ecf5;
            border-radius: 2rem;
            padding: 0.7rem 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            color: #2e5a7a;
        }

        .priority-option input:checked + .priority-label {
            background: #e7f0fa;
            border-color: #2e6a96;
            color: #1c577d;
            box-shadow: 0 2px 6px rgba(46, 106, 150, 0.2);
        }

        .priority-label i {
            font-size: 1rem;
        }

        /* низ: кнопки */
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            flex: 1;
            background: #2e6a96;
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #1f557b;
            transform: scale(0.98);
        }

        .btn-secondary {
            flex: 1;
            background: transparent;
            border: 1.5px solid #caddf0;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #366480;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: #eef3fc;
            border-color: #8fb9d6;
        }

        /* сообщения об успехе/ошибке */
        .message-area {
            margin-top: 1.5rem;
            padding: 0.9rem;
            border-radius: 1rem;
            display: none;
            font-weight: 500;
            align-items: center;
            gap: 0.7rem;
        }

        .message-area.success {
            background: #e0f2e9;
            color: #1d6f4c;
            border-left: 4px solid #2e9b6e;
            display: flex;
        }

        .message-area.error {
            background: #ffe8e6;
            color: #bc5a4a;
            border-left: 4px solid #e26d5c;
            display: flex;
        }

        .info-hint {
            background: #f0f6fd;
            padding: 0.9rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #2f688b;
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .form-header, .form-container {
                padding-left: 1.2rem;
                padding-right: 1.2rem;
            }
            .priority-label span {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

    <div class="create-card">
        <div class="form-header">
            <div class="title-area">
                <h2>
                    <i class="fas fa-plus-circle"></i>
                    Создать новую задачу
                </h2>
            </div>
            <a href="#" id="backToMainLink" class="nav-back">
                <i class="fas fa-arrow-left"></i> На главную
            </a>
        </div>

        <div class="form-container">
            <div class="info-hint">
                <i class="fas fa-lightbulb"></i>
                <span>Заполните детали задачи. После создания она появится в общем списке повседневных дел.</span>
            </div>

            <form id="taskCreationForm" method="post" action="/add">
                <div class="input-field">
                    <label><i class="fas fa-heading"></i> Название задачи <span class="required-star">*</span></label>
                    <input type="text" id="title" name="АБЦДЕ" placeholder="Например: Купить продукты, Сделать отчёт, Позвонить..." autocomplete="off" maxlength="120">
                </div>

                <div class="input-field">
                    <label><i class="fas fa-align-left"></i> Описание (необязательно)</label>
                    <textarea id="opisanie" name = "opisanie" placeholder="Добавьте заметки, детали или список подзадач..."></textarea>
                </div>

                <div class="input-field">
                    <label><i class="fas fa-flag"></i> Приоритет</label>
                    <div class="priority-group">
                        <label class="priority-option">
                            <input type="radio" name="priority" value="low" checked>
                            <span class="priority-label"><i class="fas fa-arrow-down" style="color:#5fa07e;"></i> <span>Низкий</span></span>
                        </label>
                        <label class="priority-option">
                            <input type="radio" name="priority" value="medium">
                            <span class="priority-label"><i class="fas fa-minus" style="color:#e7b42c;"></i> <span>Средний</span></span>
                        </label>
                        <label class="priority-option">
                            <input type="radio" name="priority" value="high">
                            <span class="priority-label"><i class="fas fa-arrow-up" style="color:#e26d5c;"></i> <span>Высокий</span></span>
                        </label>
                    </div>
                </div>

                <div class="input-field">
                    <label><i class="fas fa-calendar-day"></i> Дата / срок (опционально)</label>
                    <input name="u" type="date" id="taskDueDate">
                </div>

                <div class="input-field">
                    <label><i class="fas fa-tag"></i> Категория / тег</label>
                    <select id="taskCategory">
                        <option value="личные">🏡 Личные дела</option>
                        <option value="работа">💼 Работа</option>
                        <option value="здоровье">🧘 Здоровье</option>
                        <option value="дом">🏠 По дому</option>
                        <option value="другое">✨ Другое</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" id="clearFormBtn" class="btn-secondary"><i class="fas fa-eraser"></i> Очистить</button>
                    <button type="submit" id="submitTaskBtn" class="btn-primary"><i class="fas fa-save"></i> Создать задачу</button>
                </div>
            </form>

            <div id="formMessage" class="message-area"></div>
        </div>
    </div>
